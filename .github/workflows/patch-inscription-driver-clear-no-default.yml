name: Patch DRIVER no default and clear

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/patch-inscription-driver-clear-no-default.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p=Path('inscription-driver.html')
          html=p.read_text(encoding='utf-8')
          before=html
          html=html.replace('carte-tarif-driver-sans-boutons-payer-2026-05-29','carte-tarif-driver-sans-preselection-effacer-2026-05-29')
          html=html.replace('Choisis ton abonnement DRIVER. Les extras s’additionnent en sous-total, puis la caisse reçoit tout le détail.','Aucun tarif n’est précoché. Le chauffeur choisit volontairement, les extras s’additionnent, et il peut effacer en cas d’erreur.')
          html=html.replace('💬 Envoyer la preuve / parler à JB','💬 WhatsApp')
          html=html.replace('<button class="btn green" type="button" id="btnWhatsApp">💬 WhatsApp</button>', '<button class="btn green" type="button" id="btnWhatsApp">💬 WhatsApp</button><button class="btn" type="button" id="btnSms">📱 SMS</button><button class="btn" type="button" id="btnClear">🧹 Effacer</button>')
          html=html.replace('Tout est affiché ici : montant, bénéficiaire Wave, numéro, référence et date du récap. Après paiement, envoie la preuve à JB.', 'Le message contient uniquement les choix sélectionnés, avec date, sous-total et total. Après paiement Wave, envoie la preuve à JB.')
          html=re.sub(r'select\("base",\s*driverPlans\[\d+\]\);\s*}\)\(\);', 'update();})();', html)
          inject='''function clearChoices(){state.base=null;state.boost=null;state.reseau=null;markActive("base","");markActive("boost","");markActive("reseau","");update();if(window.innerWidth<=820){setTimeout(()=>$('summaryCard').scrollIntoView({behavior:'smooth',block:'start'}),80)}}'''
          if 'function clearChoices()' not in html:
              html=html.replace('function buildMessage(){', inject+'function buildMessage(){')
          if 'btnSms' in html and '$("btnSms")' not in html:
              html=html.replace('$("btnWhatsApp").addEventListener("click",()=>openWhatsApp(buildMessage()));', '$("btnWhatsApp").addEventListener("click",()=>openWhatsApp(buildMessage()));$("btnSms").addEventListener("click", e => copyText(buildMessage(), e.currentTarget));$("btnClear").addEventListener("click", clearChoices);')
              html=html.replace('$("btnWhatsApp").addEventListener("click", () => openWhatsApp(buildMessage()));', '$("btnWhatsApp").addEventListener("click", () => openWhatsApp(buildMessage()));$("btnSms").addEventListener("click", e => copyText(buildMessage(), e.currentTarget));$("btnClear").addEventListener("click", clearChoices);')
          if html!=before:
              p.write_text(html,encoding='utf-8')
              print('DRIVER patched')
          else: print('No change')
          PY
      - run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inscription-driver.html
          git commit -m "Remove DRIVER default selection and add clear"
          git push
