name: Patch DRIVER visible Wave payment block

on:
  push:
    paths:
      - .github/workflows/patch-driver-wave-visible.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make Wave payment concrete and dated
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('inscription-driver.html')
          s = p.read_text(encoding='utf-8')

          s = s.replace('carte-tarif-driver-wave-beneficiaire-2026-05-29', 'carte-tarif-driver-wave-visible-date-2026-05-29')

          css_marker = '.waveBox{margin-top:12px;border:1px solid rgba(250,204,21,.62);'
          if css_marker in s and '.waveBigPay{' not in s:
              insert_after = '.waveBox{margin-top:12px;border:1px solid rgba(250,204,21,.62);background:linear-gradient(180deg,rgba(250,204,21,.16),rgba(255,255,255,.08));border-radius:20px;padding:14px}'
              extra_css = '.waveBigPay{margin-top:12px;padding:14px;border-radius:18px;background:linear-gradient(135deg,rgba(250,204,21,.24),rgba(34,197,94,.12));border:1px solid rgba(250,204,21,.55);text-align:center}.waveBigPay small{display:block;color:rgba(255,255,255,.92);font-weight:1100;font-size:13px;text-transform:uppercase;letter-spacing:.06em}.waveBigPay strong{display:block;margin-top:4px;color:#fff8dc;font-size:30px;font-weight:1300;line-height:1.05}.waveSteps{margin-top:12px;display:grid;gap:8px}.waveStep{display:flex;gap:9px;align-items:flex-start;padding:10px;border-radius:15px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.20);color:#fff;font-weight:1000;line-height:1.35}.waveStep b{color:#fff8dc}.waveFlash{animation:waveFlash 1.1s ease}@keyframes waveFlash{0%{box-shadow:0 0 0 0 rgba(250,204,21,0)}35%{box-shadow:0 0 0 5px rgba(250,204,21,.22);border-color:rgba(250,204,21,.86)}100%{box-shadow:0 0 0 0 rgba(250,204,21,0)}}'
              s = s.replace(insert_after, insert_after + extra_css, 1)

          old = '<div class="waveBox"><div class="waveTitle"><span>💳 Paiement Wave</span><span id="waveTotalMini">—</span></div><div class="waveInfo"><div class="waveLine"><span>Bénéficiaire</span><strong id="waveName">JB BEAUVILLE</strong></div><div class="waveLine"><span>Numéro Wave</span><strong id="wavePhone">+221 77 134 28 89</strong></div><div class="waveLine"><span>Référence</span><strong id="waveRef">DRIVER</strong></div></div><div class="copyRow"><button class="miniBtn" type="button" id="btnCopyWave">📋 Copier numéro</button><button class="miniBtn gold" type="button" id="btnCopyRecap">📋 Copier récap</button></div></div>'
          new = '<div class="waveBox" id="waveBox"><div class="waveTitle"><span>💳 Paiement Wave concret</span><span id="waveTotalMini">—</span></div><div class="waveBigPay"><small>Montant à régler sur Wave</small><strong id="waveTotalBig">—</strong></div><div class="waveSteps"><div class="waveStep">1️⃣ <span>Ouvre ton application <b>Wave</b>.</span></div><div class="waveStep">2️⃣ <span>Envoie le montant à <b id="waveStepPhone">+221 77 134 28 89</b>.</span></div><div class="waveStep">3️⃣ <span>Garde la référence <b id="waveStepRef">DRIVER</b>, puis envoie la preuve WhatsApp.</span></div></div><div class="waveInfo"><div class="waveLine"><span>Bénéficiaire</span><strong id="waveName">JB BEAUVILLE</strong></div><div class="waveLine"><span>Numéro Wave</span><strong id="wavePhone">+221 77 134 28 89</strong></div><div class="waveLine"><span>Référence</span><strong id="waveRef">DRIVER</strong></div><div class="waveLine"><span>Date du récap</span><strong id="waveDate">—</strong></div></div><div class="copyRow"><button class="miniBtn" type="button" id="btnCopyWave">📋 Copier numéro</button><button class="miniBtn gold" type="button" id="btnCopyRecap">📋 Copier récap</button></div></div>'
          if old in s:
              s = s.replace(old, new, 1)
          elif 'id="waveTotalBig"' not in s:
              raise SystemExit('waveBox exact introuvable')

          old_func = 'function currentReference(){return state.base?`DRIVER-${state.base.code}${state.boost?"-"+state.boost.code:""}${state.reseau?"-"+state.reseau.code:""}`:"DRIVER"}function update(){'
          new_func = 'function currentReference(){return state.base?`DRIVER-${state.base.code}${state.boost?"-"+state.boost.code:""}${state.reseau?"-"+state.reseau.code:""}`:"DRIVER"}function paymentDateLabel(){return new Date().toLocaleString("fr-FR",{timeZone:"Africa/Dakar",day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})}function paymentDateIso(){return new Date().toISOString()}function update(){'
          if old_func in s and 'function paymentDateLabel()' not in s:
              s = s.replace(old_func, new_func, 1)

          old_update = '$("waveTotalMini").textContent=state.base?money(t.total):"—";$("waveName").textContent=WAVE_OWNER;$("wavePhone").textContent=WAVE_TO;$("waveRef").textContent=currentReference()}'
          new_update = '$("waveTotalMini").textContent=state.base?money(t.total):"—";if($("waveTotalBig"))$("waveTotalBig").textContent=state.base?money(t.total):"—";$("waveName").textContent=WAVE_OWNER;$("wavePhone").textContent=WAVE_TO;if($("waveStepPhone"))$("waveStepPhone").textContent=WAVE_TO;$("waveRef").textContent=currentReference();if($("waveStepRef"))$("waveStepRef").textContent=currentReference();if($("waveDate"))$("waveDate").textContent=paymentDateLabel()}'
          if old_update in s:
              s = s.replace(old_update, new_update, 1)
          elif 'waveTotalBig' in s and 'paymentDateLabel()' in s and 'waveDate' in s:
              print('update may already be patched')

          old_msg = '`Référence : ${currentReference()}`,"Je vais envoyer la preuve après paiement."'
          new_msg = '`Référence : ${currentReference()}`,`Date du récap : ${paymentDateLabel()}`,"Je vais envoyer la preuve après paiement."'
          if old_msg in s:
              s = s.replace(old_msg, new_msg, 1)

          old_url = 'params.set("reference",currentReference());'
          new_url = 'params.set("reference",currentReference());params.set("payment_date",paymentDateLabel());params.set("payment_date_iso",paymentDateIso());'
          if old_url in s and 'payment_date_iso' not in s:
              s = s.replace(old_url, new_url, 1)

          old_go = 'function goPayment(){if(!state.base){$("driverOptions").scrollIntoView({behavior:"smooth",block:"start"});return}location.href=buildPaymentUrl()}'
          new_go = 'function goPayment(){if(!state.base){$("driverOptions").scrollIntoView({behavior:"smooth",block:"start"});return}const box=$("waveBox");if(box){box.scrollIntoView({behavior:"smooth",block:"center"});box.classList.remove("waveFlash");void box.offsetWidth;box.classList.add("waveFlash");setTimeout(()=>{location.href=buildPaymentUrl()},650);return}location.href=buildPaymentUrl()}'
          if old_go in s:
              s = s.replace(old_go, new_go, 1)

          if 'id="waveTotalBig"' not in s or 'id="waveDate"' not in s or 'payment_date_iso' not in s or 'waveFlash' not in s:
              raise SystemExit('Patch visibilité Wave incomplet')

          p.write_text(s, encoding='utf-8')
          wf = Path('.github/workflows/patch-driver-wave-visible.yml')
          if wf.exists():
              wf.unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "DIGIY Auto Patch"
          git config user.email "actions@github.com"
          git add inscription-driver.html .github/workflows/patch-driver-wave-visible.yml
          git commit -m "Make DRIVER Wave payment concrete and dated" || echo "Nothing to commit"
          git push
