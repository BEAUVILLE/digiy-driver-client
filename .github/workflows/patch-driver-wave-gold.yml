name: Patch DRIVER Wave info gold

on:
  push:
    paths:
      - .github/workflows/patch-driver-wave-gold.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make Wave payment info gold
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('inscription-driver.html')
          s = p.read_text(encoding='utf-8')

          s = s.replace('carte-tarif-driver-sans-boutons-payer-2026-05-29', 'carte-tarif-driver-wave-or-2026-05-29')
          s = s.replace('carte-tarif-driver-wave-visible-date-2026-05-29', 'carte-tarif-driver-wave-or-2026-05-29')

          css = r'''
/* DIGIY DRIVER — paiement Wave en or : ici on règle */
.waveBox{
  border-color:rgba(250,204,21,.90)!important;
  background:
    radial-gradient(circle at top right,rgba(250,204,21,.28),transparent 38%),
    linear-gradient(180deg,rgba(250,204,21,.18),rgba(255,255,255,.08))!important;
  box-shadow:0 18px 44px rgba(250,204,21,.16),0 0 0 1px rgba(250,204,21,.14) inset!important;
}
.waveTitle,
.waveLine span,
.waveLine strong,
#waveName,
#wavePhone,
#waveRef,
#waveDate{
  color:#fff3b0!important;
  text-shadow:0 0 16px rgba(250,204,21,.36),0 2px 10px rgba(0,0,0,.28)!important;
}
.waveLine span{
  font-size:15px!important;
  font-weight:1200!important;
  letter-spacing:.04em!important;
  text-transform:uppercase!important;
}
.waveLine strong,
#waveName,
#wavePhone,
#waveRef,
#waveDate{
  font-size:19px!important;
  font-weight:1300!important;
}
.waveLine{
  border-top:1px solid rgba(250,204,21,.36)!important;
}
#wavePhone,
#waveRef{
  color:#ffe36e!important;
}
.waveBigPay strong{
  color:#ffe36e!important;
  font-size:34px!important;
  text-shadow:0 0 22px rgba(250,204,21,.45),0 4px 14px rgba(0,0,0,.30)!important;
}
'''
          if 'DIGIY DRIVER — paiement Wave en or' not in s:
              s = s.replace('</style>', css + '\n  </style>', 1)

          p.write_text(s, encoding='utf-8')
          wf = Path('.github/workflows/patch-driver-wave-gold.yml')
          if wf.exists():
              wf.unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "DIGIY Auto Patch"
          git config user.email "actions@github.com"
          git add inscription-driver.html .github/workflows/patch-driver-wave-gold.yml
          git commit -m "Make DRIVER Wave payment info gold" || echo "Nothing to commit"
          git push
