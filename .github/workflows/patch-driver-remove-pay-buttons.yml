name: Patch DRIVER remove duplicate pay buttons

on:
  push:
    paths:
      - .github/workflows/patch-driver-remove-pay-buttons.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove duplicate pay buttons but keep Wave recap
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path('inscription-driver.html')
          s = p.read_text(encoding='utf-8')

          # Marque version
          s = s.replace('carte-tarif-driver-wave-visible-date-2026-05-29', 'carte-tarif-driver-sans-boutons-payer-2026-05-29')
          s = s.replace('carte-tarif-driver-wave-beneficiaire-2026-05-29', 'carte-tarif-driver-sans-boutons-payer-2026-05-29')

          # 1) Supprimer le bouton payer/activer dans les actions, garder WhatsApp preuve
          s = s.replace(
              '<div class="actions"><button class="btn green" type="button" id="btnWhatsApp">💬 Parler / preuve</button><button class="btn gold" type="button" id="btnPay">💳 Payer / activer</button></div>',
              '<div class="actions"><button class="btn green" type="button" id="btnWhatsApp">💬 Envoyer la preuve / parler à JB</button></div>'
          )
          s = s.replace(
              '<div class="actions"><button class="btn green" type="button" id="btnWhatsApp">💬 Parler / preuve</button><button class="btn gold" type="button" id="btnPay">💳 Payer / activer</button></div>',
              '<div class="actions"><button class="btn green" type="button" id="btnWhatsApp">💬 Envoyer la preuve / parler à JB</button></div>'
          )
          # variante si texte différent
          s = re.sub(r'<button class="btn gold" type="button" id="btnPay">.*?</button>', '', s)

          # 2) Supprimer le bouton flottant final payer
          s = re.sub(r'\s*<button class="floating-pay" type="button" id="btnFloatingPay">.*?</button>\s*', '\n', s, flags=re.S)

          # 3) Supprimer/neutraliser les écouteurs de boutons supprimés pour éviter erreur JS
          s = re.sub(r'\$\("btnPay"\)\.addEventListener\("click",goPayment\);', '', s)
          s = re.sub(r'\$\("btnFloatingPay"\)\.addEventListener\("click",goPayment\);', '', s)
          s = re.sub(r'\$\("btnPay"\)\.addEventListener\("click",\(\)=>openWhatsApp\(buildMessage\(\)\)\);', '', s)
          s = re.sub(r'\$\("btnFloatingPay"\)\.addEventListener\("click",.*?\);', '', s)

          # 4) Le bloc Wave devient l'action principale visible
          s = s.replace('Le paiement ouvre la caisse avec le module, le Boost, le RÉSEAU, les extras, le total et les informations Wave.',
                        'Tout est affiché ici : montant, bénéficiaire Wave, numéro, référence et date du récap. Après paiement, envoie la preuve à JB.')
          s = s.replace('Paiement Wave concret', 'Paiement Wave concret · à régler ici')

          # 5) Un seul bouton WhatsApp peut prendre toute la largeur
          s = s.replace('.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}', '.actions{display:grid;grid-template-columns:1fr;gap:9px;margin-top:14px}')

          if 'id="btnPay"' in s or 'id="btnFloatingPay"' in s:
              raise SystemExit('Boutons payer encore présents')

          p.write_text(s, encoding='utf-8')
          wf = Path('.github/workflows/patch-driver-remove-pay-buttons.yml')
          if wf.exists():
              wf.unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "DIGIY Auto Patch"
          git config user.email "actions@github.com"
          git add inscription-driver.html .github/workflows/patch-driver-remove-pay-buttons.yml
          git commit -m "Remove duplicate DRIVER pay buttons" || echo "Nothing to commit"
          git push
